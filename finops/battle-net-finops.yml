specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Battle.net
providerId: battle-net
publisherName: Blizzard Entertainment, Inc.
serviceCategory: Gaming / Developer APIs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Games
  - Gaming
  - Blizzard
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for the Battle.net Developer APIs: zero direct cost (free, rate-limited
  developer access), so FinOps focuses on attribution, rate-limit utilization, and partner-access decisions
  rather than billed spend.'
sources:
  - https://develop.battle.net/access/clients
  - https://community.developer.battle.net/documentation
principles:
  - name: Visibility
    description: Track requests per OAuth Client ID against the 100 req/s and 36,000 req/hr ceilings using
      your own observability stack — Blizzard does not expose a usage API.
  - name: Allocation
    description: Issue a separate OAuth Client ID per consuming application or team to attribute usage
      and avoid one team starving another against the shared per-client ceiling.
  - name: Optimization
    description: Cache static game-data responses (realms, classes, items) aggressively. The hourly ceiling
      is the binding constraint; cached responses do not consume quota.
  - name: Accountability
    description: Designate an owner of the partner relationship with Blizzard Developer Relations who
      can request elevated limits when an application's growth justifies it.
billingModel:
  pricingCategory: No Direct Charge
  billingFrequency: Not Billed
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: One-Time
focusColumns:
  ServiceName: Battle.net Developer APIs
  ServiceCategory: Gaming / Developer APIs
  ProviderName: Battle.net
  PublisherName: Blizzard Entertainment, Inc.
  InvoiceIssuerName: Blizzard Entertainment, Inc.
  PricingCategory: No Direct Charge
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of API requests per OAuth Client ID; for utilization tracking against the free-tier
      ceilings, not for billing
    unit: request
    aggregation: sum
    dimensions:
      - oauth_client_id
      - region
      - game
      - endpoint
  - name: rate_limit_utilization
    description: Percent of per-second / per-hour ceiling consumed; used to forecast when partner access
      becomes necessary
    unit: percent
    aggregation: max
    dimensions:
      - oauth_client_id
      - window
  - name: cache_hits
    description: Cached responses that did not consume Blizzard quota
    unit: request
    aggregation: count
    dimensions:
      - oauth_client_id
      - endpoint
apis:
  - name: World of Warcraft Game Data API
    baseURL: https://us.api.blizzard.com
    serviceName: World of Warcraft Game Data API
    serviceCategory: API
  - name: World of Warcraft Profile API
    baseURL: https://us.api.blizzard.com
    serviceName: World of Warcraft Profile API
    serviceCategory: API
  - name: Diablo III API
    baseURL: https://us.api.blizzard.com
    serviceName: Diablo III API
    serviceCategory: API
  - name: Hearthstone Game Data API
    baseURL: https://us.api.blizzard.com
    serviceName: Hearthstone Game Data API
    serviceCategory: API
  - name: StarCraft II API
    baseURL: https://us.api.blizzard.com
    serviceName: StarCraft II API
    serviceCategory: API
unitEconomics:
  - name: Cost per Active Consumer
    metric: '0 / active_consumers (no direct cost; opportunity cost = engineering time + partner relationship)'
    target: track engineering hours instead
  - name: Headroom Against Ceiling
    metric: peak_requests_per_hour / 36000
    target: '< 0.7 to trigger partner-access conversation'
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
