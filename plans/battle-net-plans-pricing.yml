specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Battle.net
providerId: battle-net
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Games
  - Gaming
  - Blizzard
  - World Of Warcraft
  - Diablo
  - Hearthstone
  - Starcraft
description: The Battle.net Developer Portal exposes Blizzard's game-data and player-profile APIs at no
  cost. There is one publicly available access plan governed by Blizzard's API Terms of Use; commercial
  use is permitted with attribution. Higher rate limits are not offered as a paid tier — applications
  exceeding the default ceiling must contact Blizzard developer relations.
sources:
  - https://develop.battle.net/access/clients
  - https://community.developer.battle.net/documentation
plans:
  - id: battle-net-developer
    name: Battle.net Developer Access
    type: freemium
    description: Free OAuth 2.0 client access to Blizzard's game-data and profile APIs across World of
      Warcraft, Diablo, Hearthstone, and StarCraft. Requires a Battle.net account and a registered API
      client; no payment, no per-request cost.
    entries:
      - label: API Access
        description: OAuth 2.0 client credentials and authorization-code flows are free for all approved
          developers
        name: api_access
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://us.api.blizzard.com
          - https://eu.api.blizzard.com
          - https://kr.api.blizzard.com
          - https://tw.api.blizzard.com
          - https://oauth.battle.net
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Per-Second Rate Ceiling
        description: Default per-second rate limit per OAuth client; not raised via a paid tier
        name: per_second_rate
        type: rate
        metric: requests_per_second
        limit: 100
        timeFrame: second
        geo: global
        domains:
          - https://us.api.blizzard.com
          - https://eu.api.blizzard.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Per-Hour Rate Ceiling
        description: Default per-hour rate limit per OAuth client; not raised via a paid tier
        name: per_hour_rate
        type: rate
        metric: requests_per_hour
        limit: 36000
        timeFrame: hour
        geo: global
        domains:
          - https://us.api.blizzard.com
          - https://eu.api.blizzard.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: World of Warcraft Game Data API
      - name: World of Warcraft Profile API
      - name: Diablo III Community / Profile / Game Data APIs
      - name: Hearthstone Game Data API
      - name: StarCraft II Community / Game Data APIs
      - name: Battle.net OAuth 2.0
      - name: Public Documentation
      - name: Community Forums Support
      - name: Commercial Use Permitted (with attribution per ToU)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
