specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Battle.net
providerId: battle-net
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Games
  - Gaming
  - Blizzard
  - Rate Limiting
description: Battle.net Developer APIs enforce two simultaneous limits per OAuth client (Client ID) —
  100 requests per second and 36,000 requests per hour — across all regional API hosts (US/EU/KR/TW).
  Limits are not raised via a paid plan; applications expecting heavier load must contact Blizzard Developer
  Relations for partner-tier access.
sources:
  - https://develop.battle.net/access/clients
  - https://community.developer.battle.net/documentation
responseCodes:
  throttled: 429
limits:
  - name: Per-second rate (per client)
    scope: oauth-client
    metric: requests_per_second
    limit: 100
    timeFrame: second
    notes: Hard limit applied per OAuth Client ID across all regional hosts.
  - name: Per-hour rate (per client)
    scope: oauth-client
    metric: requests_per_hour
    limit: 36000
    timeFrame: hour
    notes: Hard limit applied per OAuth Client ID across all regional hosts.
policies:
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429 responses. Spread workload across the per-second
      window rather than bursting.
  - name: OAuth Client Scoping
    description: Limits are tracked per Client ID, not per access token. Issuing additional tokens against
      the same client does not raise the ceiling.
  - name: Regional Hosts
    description: us.api.blizzard.com / eu.api.blizzard.com / kr.api.blizzard.com / tw.api.blizzard.com
      share a single per-client quota.
  - name: Partner Access
    description: Higher limits require a partner agreement with Blizzard Developer Relations; there is
      no self-serve paid tier.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
