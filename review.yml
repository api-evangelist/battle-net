provider: Battle.net
providerId: battle-net
reviewer: API Evangelist
reviewedBy: Kin Lane
date: '2026-05-30'
topic: streaming-surface
question: >-
  Does Blizzard Battle.net expose a documented public streaming surface
  (Server-Sent Events, WebSockets, gRPC streaming, GraphQL subscriptions,
  webhooks, or any push-based event delivery)?
finding: none-public
summary: >-
  Blizzard Battle.net does NOT expose a documented public streaming API
  surface. The Battle.net Developer Portal at
  https://community.developer.battle.net/ documents a single, uniform
  delivery model across every public product — OAuth 2.0 secured, regional
  REST endpoints (us.api.blizzard.com, eu.api.blizzard.com,
  kr.api.blizzard.com, tw.api.blizzard.com, gateway.battlenet.com.cn) that
  return JSON over HTTP GET. This applies to the Battle.net OAuth surface
  (authorization, token, and token introspection endpoints) and to every
  game-specific product currently published — World of Warcraft Game Data,
  World of Warcraft Profile, World of Warcraft Classic Game Data, Diablo III
  Game Data, Diablo III Community, Hearthstone Game Data, StarCraft II Game
  Data, and StarCraft II Community. None of the published Battle.net API
  reference pages describe a Server-Sent Events channel, a WebSocket
  gateway, a gRPC streaming interface, a GraphQL subscription, or a public
  webhook subscription API. Push semantics in the Blizzard ecosystem
  (matchmaking, presence, friends, voice, in-game events, Overwatch live
  match telemetry) are delivered through the proprietary Battle.net client
  and game-engine networking layers, not through any public developer API.
restPolling:
  baseURLs:
    - https://us.api.blizzard.com/
    - https://eu.api.blizzard.com/
    - https://kr.api.blizzard.com/
    - https://tw.api.blizzard.com/
    - https://gateway.battlenet.com.cn/
  oauthEndpoints:
    - https://oauth.battle.net/authorize
    - https://oauth.battle.net/token
    - https://oauth.battle.net/oauth/check_token
  transport: HTTP GET (request/response)
  formats:
    - JSON
  auth: >-
    OAuth 2.0 client credentials flow for game data; OAuth 2.0 authorization
    code flow for player profile data. Client ID and secret issued from the
    Battle.net Developer Portal.
  rateLimits: >-
    100 requests per second and 36,000 requests per hour per client per
    region, per Blizzard forum policy
    (https://us.forums.blizzard.com/en/blizzard/t/api-access-clients-rate-limits/5602).
  notes: >-
    All change detection — auction house updates, realm status, character
    progression, achievements, leaderboard movement, season rollovers,
    Hearthstone card releases, StarCraft II grandmaster ladder changes —
    requires consumer-side polling. Several Game Data endpoints expose a
    Last-Modified header and accept If-Modified-Since for conditional polling,
    but there is no push delivery.
streamingChannels:
  serverSentEvents: false
  webSockets: false
  grpcStreaming: false
  graphqlSubscriptions: false
  mqtt: false
  amqp: false
  kafkaTopics: false
  publicWebhooks: false
  longPolling: false
webhookLikeSurfaces: []
