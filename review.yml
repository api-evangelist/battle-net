    transport: HTTPS request/response (OAuth 2.0 token, authorize, check_token)
    docs: https://community.developer.battle.net/documentation/battle-net/oauth-apis
notablyAbsentProducts:
  - product: Overwatch / Overwatch 2
    note: >-
      Blizzard has not republished a public Overwatch developer API on the
      community developer portal. The legacy Overwatch stats endpoints have
      been deprecated, and any community Overwatch API projects scrape the
      career profile page rather than consuming a Blizzard streaming surface.
  - product: Call of Duty
    note: >-
      Call of Duty (Activision) is not exposed through the Battle.net
      developer portal, has no public API, and no public streaming surface.
  - product: Battle.net presence / friends / matchmaking / voice
    note: >-
      Delivered exclusively through the proprietary Battle.net desktop client
      and per-game networking stacks. No public developer API and no public
      streaming surface.
nativeClientRealTime:
  product: Battle.net Desktop Client and per-game network stacks
  public: false
  mechanism: >-
    Real-time signaling for presence, friends, group chat, matchmaking, voice
    chat, in-game telemetry, and live match state is handled by the
    proprietary Battle.net client and each game's engine networking layer
    (WoW realm servers, Diablo battle servers, Hearthstone game server,
    Overwatch matchmaking). These are not exposed as a public network API.
  docs: https://www.blizzard.com/en-us/legal/a2989b50-54f6-43f3-b55c-fa78e0ca3b38/blizzard-developer-api-terms-of-use
conclusion: >-
  Battle.net has no documented public streaming surface. Every game-specific
  product (World of Warcraft, World of Warcraft Classic, Diablo III,
  Hearthstone, StarCraft II) and the Battle.net OAuth surface itself are
  REST-only, OAuth 2.0 secured, request/response over HTTPS. There is no
  Server-Sent Events endpoint, no WebSocket gateway, no gRPC stream, no
  GraphQL subscription, and no public webhook subscription API. Integrators
  who need change detection must poll the regional REST endpoints within
  Blizzard's published rate limits (100 req/sec, 36,000 req/hour per client
  per region) and rely on Last-Modified / If-Modified-Since where exposed.
  Any real-time, push-based behavior in the Blizzard ecosystem lives behind
  the proprietary Battle.net client and per-game networking layers, which
  are not exposed to third-party developers.
